<svg width="860" height="1374" viewBox="0 0 860 1374" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Route-first WEB app</title>
  <desc id="desc">Syntax highlighted code block: Route-first WEB app.</desc>
  <defs>
