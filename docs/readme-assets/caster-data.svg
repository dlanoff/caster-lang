<svg width="1040" height="580" viewBox="0 0 1040 580" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Caster MAP and DYN example</title>
  <desc id="desc">Syntax highlighted Caster code showing nested MAP declarations and DYN decoding with else fallback.</desc>
  <defs>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f7bd6"/>
      <stop offset="0.55" stop-color="#7457d9"/>
      <stop offset="1" stop-color="#a87924"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .base { font: 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #e8eef7; }
      .title { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #8ca3b8; letter-spacing: .04em; }
      .kw { fill: #ff5f6d; font-weight: 700; }
      .fn { fill: #c792ea; }
      .blue { fill: #4da3ff; }
      .type { fill: #9dd6ff; }
      .str { fill: #f6c177; }
      .num { fill: #9dd6ff; }
      .op { fill: #95a7bd; }
      .comment { fill: #8ca3b8; font-style: italic; }
    </style>
  </defs>
  <rect x="1" y="1" width="1038" height="578" rx="18" fill="url(#rim)" opacity="0.9"/>
  <rect x="3" y="3" width="1034" height="574" rx="17" fill="#0f1420"/>
  <path d="M18 92 C158 45 268 117 386 70 C536 10 649 109 793 61 C893 28 970 48 1016 82" fill="none" stroke="#4da3ff" stroke-width="1.4" opacity="0.4" filter="url(#glow)"/>
  <circle cx="31" cy="31" r="6" fill="#ff5f6d"/>
  <circle cx="54" cy="31" r="6" fill="#f6c177"/>
  <circle cx="77" cy="31" r="6" fill="#4da3ff"/>
  <text class="title" x="865" y="36">DATA + DYN</text>

  <text class="base" x="36" y="78"><tspan class="type">MAP</tspan><tspan> Account </tspan><tspan class="op">=</tspan><tspan> {</tspan></text>
  <text class="base" x="70" y="108"><tspan class="type">INT</tspan><tspan> id </tspan><tspan class="op">=</tspan><tspan> </tspan><tspan class="num">0</tspan><tspan>,</tspan></text>
  <text class="base" x="70" y="138"><tspan class="type">FLT</tspan><tspan> balance </tspan><tspan class="op">=</tspan><tspan> </tspan><tspan class="num">0.0</tspan><tspan>,</tspan></text>
  <text class="base" x="70" y="168"><tspan class="type">BOL</tspan><tspan> active </tspan><tspan class="op">=</tspan><tspan> false,</tspan></text>

  <text class="base" x="70" y="210"><tspan class="type">MAP</tspan><tspan> owner </tspan><tspan class="op">=</tspan><tspan> {</tspan></text>
  <text class="base" x="104" y="240"><tspan class="type">STR</tspan><tspan> name </tspan><tspan class="op">=</tspan><tspan> </tspan><tspan class="str">"Guest"</tspan><tspan>,</tspan></text>
  <text class="base" x="104" y="270"><tspan class="type">STR</tspan><tspan> email </tspan><tspan class="op">=</tspan><tspan> </tspan><tspan class="str">""</tspan></text>
  <text class="base" x="70" y="300"><tspan>}</tspan></text>
  <text class="base" x="36" y="330"><tspan>}</tspan></text>

  <text class="base" x="36" y="378"><tspan class="kw">FN</tspan><tspan> </tspan><tspan class="fn">decodeAccount</tspan><tspan>(</tspan><tspan class="type">DYN</tspan><tspan> data) </tspan><tspan class="op">-&gt;</tspan><tspan> Account </tspan><tspan class="op">=</tspan><tspan> (</tspan></text>
  <text class="base" x="70" y="408"><tspan class="kw">ret</tspan><tspan> {</tspan></text>
  <text class="base" x="104" y="438"><tspan>id </tspan><tspan class="op">=</tspan><tspan> data.id </tspan><tspan class="kw">else</tspan><tspan> </tspan><tspan class="num">0</tspan><tspan>,</tspan></text>
  <text class="base" x="104" y="468"><tspan>balance </tspan><tspan class="op">=</tspan><tspan> data.balance </tspan><tspan class="kw">else</tspan><tspan> </tspan><tspan class="num">0.0</tspan><tspan>,</tspan></text>
  <text class="base" x="104" y="498"><tspan>owner </tspan><tspan class="op">=</tspan><tspan> { name </tspan><tspan class="op">=</tspan><tspan> data.owner.name </tspan><tspan class="kw">else</tspan><tspan> </tspan><tspan class="str">"Guest"</tspan><tspan> }</tspan></text>
  <text class="base" x="70" y="528"><tspan>}</tspan><tspan> </tspan><tspan class="comment">// decoded Account</tspan></text>
  <text class="base" x="36" y="552"><tspan>)</tspan></text>
</svg>
