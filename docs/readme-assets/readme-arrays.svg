<svg width="860" height="594" viewBox="0 0 860 594" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ARR add, methods, and loops</title>
  <desc id="desc">Syntax highlighted code block: ARR add, methods, and loops.</desc>
  <defs>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7457d9"/>
      <stop offset="0.55" stop-color="#1f7bd6"/>
      <stop offset="1" stop-color="#a87924"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .base { font: 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #e8eef7; }
      .title { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #8ca3b8; letter-spacing: .04em; }
      .kw { fill: #ff5f6d; font-weight: 700; }
      .fn { fill: #c792ea; }
      .blue { fill: #4da3ff; }
      .type { fill: #9dd6ff; }
      .num { fill: #9dd6ff; }
      .loop { fill: #ffe49c; }
      .str { fill: #f6c177; }
      .op { fill: #95a7bd; }
      .comment { fill: #8ca3b8; font-style: italic; }
      .base-fill { fill: #e8eef7; }
    </style>
  </defs>
  <rect x="1" y="1" width="858" height="592" rx="14" fill="url(#rim)" opacity="0.86"/>
  <rect x="3" y="3" width="854" height="588" rx="13" fill="#0f1420"/>
  <path d="M18 61 C155 25 258 82 378 58 C516 25 619 92 722 58 C783 40 826 46 842 64" fill="none" stroke="#7457d9" stroke-width="1.25" opacity="0.38" filter="url(#glow)"/>
  <circle cx="29" cy="29" r="5.5" fill="#ff5f6d"/>
  <circle cx="50" cy="29" r="5.5" fill="#f6c177"/>
  <circle cx="71" cy="29" r="5.5" fill="#4da3ff"/>
  <text class="title" x="776" y="34">CASTER</text>
  <text class="title" x="804" y="60" fill="#f6c177">*</text>
  <text class="base" xml:space="preserve" x="36" y="78"><tspan class="type">ARR</tspan>[<tspan class="type">INT</tspan>] <tspan class="base-fill">Numbers</tspan> <tspan class="op">=</tspan> []</text>
  <text class="base" xml:space="preserve" x="36" y="104"></text>
  <text class="base" xml:space="preserve" x="36" y="130"><tspan class="kw">FN</tspan> <tspan class="fn">arrayTour</tspan>() <tspan class="op">-&gt;</tspan> <tspan class="type">INT</tspan> <tspan class="op">=</tspan> (</text>
  <text class="base" xml:space="preserve" x="36" y="156">    <tspan class="base-fill">nums</tspan> <tspan class="op">=</tspan> []</text>
  <text class="base" xml:space="preserve" x="36" y="182">    <tspan class="base-fill">nums</tspan> <tspan class="op">=</tspan> <tspan class="base-fill">nums</tspan><tspan class="op">.</tspan><tspan class="fn">add</tspan>(<tspan class="num">1</tspan>)       <tspan class="comment">// [1]</tspan></text>
  <text class="base" xml:space="preserve" x="36" y="208">    <tspan class="base-fill">nums</tspan> <tspan class="op">=</tspan> <tspan class="base-fill">nums</tspan><tspan class="op">.</tspan><tspan class="fn">add</tspan>([<tspan class="num">2</tspan>, <tspan class="num">3</tspan>])  <tspan class="comment">// [1, 2, 3]</tspan></text>
  <text class="base" xml:space="preserve" x="36" y="234">    <tspan class="op">*</tspan><tspan class="base-fill">nums</tspan><tspan class="op">.</tspan><tspan class="fn">add</tspan>(<tspan class="num">4</tspan>)             <tspan class="comment">// nums is [1, 2, 3, 4]</tspan></text>
  <text class="base" xml:space="preserve" x="36" y="260"></text>
  <text class="base" xml:space="preserve" x="36" y="286">    <tspan class="base-fill">doubled</tspan> <tspan class="op">=</tspan> <tspan class="base-fill">nums</tspan><tspan class="op">.</tspan><tspan class="fn">upd</tspan>(<tspan class="loop">e</tspan> <tspan class="op">*</tspan> <tspan class="num">2</tspan>)     <tspan class="comment">// [2, 4, 6, 8]</tspan></text>
  <text class="base" xml:space="preserve" x="36" y="312">    <tspan class="base-fill">large</tspan> <tspan class="op">=</tspan> <tspan class="base-fill">nums</tspan><tspan class="op">.</tspan><tspan class="fn">filt</tspan>(<tspan class="loop">e</tspan> <tspan class="op">&gt;=</tspan> <tspan class="num">3</tspan>)     <tspan class="comment">// [3, 4]</tspan></text>
  <text class="base" xml:space="preserve" x="36" y="338">    <tspan class="base-fill">total</tspan> <tspan class="op">=</tspan> <tspan class="base-fill">nums</tspan><tspan class="op">.</tspan><tspan class="fn">agg</tspan>( <tspan class="op">+=</tspan> <tspan class="loop">e</tspan> )      <tspan class="comment">// 10</tspan></text>
  <text class="base" xml:space="preserve" x="36" y="364">    <tspan class="base-fill">anyLarge</tspan> <tspan class="op">=</tspan> <tspan class="base-fill">nums</tspan><tspan class="op">.</tspan><tspan class="fn">any</tspan>(<tspan class="loop">e</tspan> <tspan class="op">&gt;</tspan> <tspan class="num">3</tspan>)    <tspan class="comment">// true</tspan></text>
  <text class="base" xml:space="preserve" x="36" y="390"></text>
  <text class="base" xml:space="preserve" x="36" y="416">    <tspan class="kw">loop</tspan>([<tspan class="base-fill">nums</tspan>])(</text>
  <text class="base" xml:space="preserve" x="36" y="442">        <tspan class="fn">log</tspan>(<tspan class="loop">i</tspan>, <tspan class="loop">e</tspan>) <tspan class="comment">// 0 1, 1 2, ...</tspan></text>
  <text class="base" xml:space="preserve" x="36" y="468">    )</text>
  <text class="base" xml:space="preserve" x="36" y="494"></text>
  <text class="base" xml:space="preserve" x="36" y="520">    <tspan class="kw">ret</tspan> <tspan class="base-fill">total</tspan></text>
  <text class="base" xml:space="preserve" x="36" y="546">)</text>
</svg>
